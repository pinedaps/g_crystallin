comment: "Calvados 3 coarse grained amino acid model for use with Faunus"

T:  293.0
pH: 7.1
salt_c: 0.115
epsilon_c: 0.8368
sidechains: False
xyz_path: 1AMM.xyz

atoms:
  - {charge: -1.00, hydrophobicity: !Lambda 0, mass: 0, name: CTR, σ: 2.0, ε: 0.8368}
  - {charge: 0.78, hydrophobicity: !Lambda 0, mass: 0, name: NTR, σ: 2.0, ε: 0.8368}
  - {charge: 1.00, hydrophobicity: !Lambda 0.7407902764839954, mass: 156.19, name: ARG, σ: 6.56, ε: 0.8368, custom: {alpha: 0.0}}
  - {charge: -1.00, hydrophobicity: !Lambda 0.092587557536158,  mass: 115.09, name: ASP, σ: 5.58, ε: 0.8368, custom: {alpha: 0.0}}
  - {charge: -1.00, hydrophobicity: !Lambda 0.000249590539426,  mass: 129.11, name: GLU, σ: 5.92, ε: 0.8368, custom: {alpha: 0.0}}
  - {charge: 1.00, hydrophobicity: !Lambda 0.1380602542039267, mass: 128.17, name: LYS, σ: 6.36, ε: 0.8368, custom: {alpha: 0.0}}
  - {charge: 0.18, hydrophobicity: !Lambda 0.4087176216525476, mass: 137.14, name: HIS, σ: 6.08, ε: 0.8368, custom: {alpha: 0.0}}
  - {charge: 0.88, hydrophobicity: !Lambda 0.5922529084601322, mass: 103.14, name: CYS, σ: 5.48, ε: 0.8368, custom: {alpha: 0.0}}
  - {charge: 0.0, hydrophobicity: !Lambda 0.3706962163690402, mass: 114.1,  name: ASN, σ: 5.68, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.3143449791669133, mass: 128.13, name: GLN, σ: 6.02, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.4473142572693176, mass: 87.08,  name: SER, σ: 5.18, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.7538308115197386, mass: 57.05,  name: GLY, σ: 4.5,  ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.2672387936544146, mass: 101.11, name: THR, σ: 5.62, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.1897587086430935, mass: 71.09,  name: ALA, σ: 5.12, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.5170874160398543, mass: 131.2,  name: MET, σ: 6.18, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.950628687301107,  mass: 163.18, name: TYR, σ: 6.46, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.2936174211771383, mass: 99.13,  name: VAL, σ: 5.86, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 1.033450123574512,  mass: 186.22, name: TRP, σ: 6.78, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.5548615312993875, mass: 113.16, name: LEU, σ: 6.18, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.5130398874425708, mass: 113.16, name: ILE, σ: 6.18, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.3469777523519372, mass: 97.12,  name: PRO, σ: 5.56, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.8906449355499866, mass: 147.18, name: PHE, σ: 6.36, ε: 0.8368}
  - {charge: 0.0, hydrophobicity: !Lambda 0.5922529084601322, mass: 103.14, name: CSS, σ: 5.48, ε: 0.8368}

molecules:
- name: MOL1
  degrees_of_freedom: Rigid
  has_com: true
  from_structure: 1AMM.xyz
- name: MOL2
  degrees_of_freedom: Rigid
  has_com: true
  from_structure: 1AMM.xyz

system:
  cell: !Sphere {radius: 60.0}
  medium:
    permittivity: !Water
    temperature: 293.0
    salt: [!NaCl, 0.115]
  blocks:
  - molecule: MOL1
    N: 1
    insert: !RandomCOM { filename: 1AMM.xyz, rotate: true, directions: none, offset: [0.0, 0.0, -40.0] }
  - molecule: MOL2
    N: 1
    insert: !RandomCOM { filename: 1AMM.xyz, rotate: true, directions: none, offset: [0.0, 0.0, 40.0] }
  energy:
    nonbonded:
      default:
        - !Coulomb {cutoff: 1000.0}
        - !AshbaughHatch {mixing: arithmetic, cutoff: 20.0}

analysis:
- !MassCenterDistance
  molecules: [MOL1, MOL2]
  file: com_distance_293.0.dat.gz
  frequency: !Every 100
- !Trajectory
  file: traj_293.0.xyz
  frequency: !Every 100

propagate:
  seed: Hardware
  criterion: Metropolis
  repeat: 10000000
  collections:
  - !Stochastic
    moves:
    - !RotateMolecule
      molecule: MOL1
      dp: 0.28
      weight: 1.0
    - !RotateMolecule
      molecule: MOL2
      dp: 0.28
      weight: 1.0
    - !TranslateMolecule
      molecule: MOL2
      dp: 0.1
      weight: 1.0
      directions: !z

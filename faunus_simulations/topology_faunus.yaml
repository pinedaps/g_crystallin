molecules:
- name: MOL1
  degrees_of_freedom: Rigid
  has_com: true
  from_structure: "1AMM.xyz"
- name: MOL2
  degrees_of_freedom: Rigid
  has_com: true
  from_structure: "1AMM.xyz"

system:
  cell: !Sphere { radius: 80.0 }
  medium:
    permittivity: !Water
    temperature: 293
    salt: [!NaCl, 0.115]
  blocks:
  - molecule: MOL1
    N: 1
    insert: !RandomCOM { filename: "1AMM.xyz", rotate: true, directions: none, offset: [0.0, 0.0, 0.0] }
  - molecule: MOL2
    N: 1
    insert: !RandomCOM { filename: "1AMM.xyz", rotate: true, directions: none, offset: [0.0, 0.0, 23.0] }
  energy:
    nonbonded:
      default:
      - !Coulomb {cutoff: 1000}
      - !AshbaughHatch {mixing: LB, cutoff: 20}

analysis:
- !MassCenterDistance
  molecules: [MOL1, MOL2]
  file: com_distance.dat.gz
  frequency: !Every 100
- !Trajectory
  file: traj.xyz
  frequency: !Every 100

propagate:
  seed: Hardware
  criterion: Metropolis
  repeat: 500000
  collections:
  - !Stochastic
    moves:
    - !RotateMolecule
      molecule: MOL1
      dp: 1.0
      weight: 1.0
    - !RotateMolecule
      molecule: MOL2
      dp: 1.0
      weight: 1.0
    - !TranslateMolecule
      molecule: MOL2
      dp: 1.0
      weight: 1.0
      directions: !z
